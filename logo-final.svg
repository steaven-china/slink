<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 240" width="250" height="240">
  <!-- tkinter 窗口背景 -->
  <rect x="40" y="30" width="170" height="180" fill="#d9d9d9"/>

  <!-- 3D 凸起外框：左上白，右下深灰 -->
  <polyline points="40,210 40,30 210,30" fill="none" stroke="#ffffff" stroke-width="2"/>
  <polyline points="40,210 210,210 210,30" fill="none" stroke="#808080" stroke-width="2"/>

  <!-- 标题栏 -->
  <rect x="42" y="32" width="166" height="28" fill="#c0c0c0"/>
  <text x="52" y="52" font-family="sans-serif" font-size="14" fill="#000000">slink</text>

  <!-- 关闭按钮（凸起） -->
  <rect x="188" y="38" width="18" height="16" fill="#c0c0c0"/>
  <polyline points="188,54 188,38 206,38" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <polyline points="188,54 206,54 206,38" fill="none" stroke="#404040" stroke-width="1.5"/>
  <line x1="192" y1="42" x2="202" y2="50" stroke="#000000" stroke-width="1.5"/>
  <line x1="202" y1="42" x2="192" y2="50" stroke="#000000" stroke-width="1.5"/>

  <!-- 凹陷内容区 -->
  <rect x="60" y="80" width="130" height="100" fill="#ffffff"/>
  <polyline points="60,180 60,80 190,80" fill="none" stroke="#808080" stroke-width="2"/>
  <polyline points="60,180 190,180 190,80" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- 文字 sli：左对齐、粗体、允许超出白框 -->
  <text x="68" y="170" font-family="sans-serif" font-size="64" font-weight="900" fill="#000000">sli</text>

  <!-- 右侧三条横线（靠下，紧贴文字右边） -->
  <rect x="145" y="158" width="40" height="7" rx="1" fill="#000000"/>
  <rect x="145" y="172" width="28" height="7" rx="1" fill="#000000"/>
  <rect x="145" y="186" width="44" height="7" rx="1" fill="#000000"/>
</svg>
