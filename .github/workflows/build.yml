name: CI / Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile slink/*.py
      - name: Quick import test
        run: |
          python -c "from slink.cli import main; print('cli OK')"
          python -c "from slink.gui import main; print('gui OK')"

  build-windows:
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt nuitka
      - name: Build sli CLI
        run: python -m nuitka --standalone --remove-output --output-dir=dist --assume-yes-for-downloads build_sli.py
      - name: Build sli-ui GUI
        run: python -m nuitka --standalone --remove-output --output-dir=dist --assume-yes-for-downloads build_sli_ui.py
      - name: Upload sli artifact
        uses: actions/upload-artifact@v4
        with:
          name: sli-windows-x64
          path: dist/build_sli.dist/
      - name: Upload sli-ui artifact
        uses: actions/upload-artifact@v4
        with:
          name: sli-ui-windows-x64
          path: dist/build_sli_ui.dist/

  release:
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package
        run: |
          cd artifacts
          zip -r sli-windows-x64.zip sli-windows-x64/
          zip -r sli-ui-windows-x64.zip sli-ui-windows-x64/
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.zip
          generate_release_notes: true
