name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: slink-linux
          - os: windows-latest
            artifact: slink-windows

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Build standalone binary
        run: |
          python -m nuitka `
            --standalone `
            --remove-output `
            --disable-plugin=pkg-resources `
            --include-package=click `
            --include-package=cryptography `
            --include-package=pyyaml `
            --output-filename=sli `
            slink.py
        shell: pwsh

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path slink.dist\* -DestinationPath ${{ matrix.artifact }}.zip
        shell: pwsh

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C slink.dist .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
